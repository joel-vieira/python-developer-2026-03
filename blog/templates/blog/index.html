{% extends "blog/base.html" %}
{% block title %}
  Posts
{% endblock title %}
{% block content %}
  {% if published_posts %}
    <ul>
      {% for post in published_posts %}
        <li><strong>{{ post.title }}</strong>, {{ post.author.full_name }}</li>
      {% endfor %}
    <ul>
  {% endif %}
{% endblock content %}
