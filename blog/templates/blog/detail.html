{% extends "blog/base.html" %}
{% load markdownify %}
{% block title %}
  Post: {{ post.title }}
{% endblock title %}
{% block content %}
  <h1 class="page-title">{{ post.title }}</h1>
  <p class="page-subtitle">By {{ post.author.full_name }}</p>

  <p class="post-body">{{ post.body | markdownify}}</p>

  <a class="nav-link" href="{% url 'blog:index' %}">Back to posts list</a>
{% endblock content %}
