{% extends "blog/base.html" %}
{% load markdownify %}
{% block title %}
  Post: {{ post.title }}
{% endblock title %}
{% block content %}
  <h1>{{ post.title }}</h1>
  <p>By {{ post.author.full_name }}</p>

  <p>{{ post.body | markdownify}}</p>

  <a href="{% url 'blog:index' %}">Back to posts list</a>
{% endblock content %}
